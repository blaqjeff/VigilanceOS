name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker tag to publish (default: latest)"
        required: false
        default: "latest"
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "ui/package.json"
      - "ui/package-lock.json"
      - "src/**"
      - "scripts/**"
      - "ui/**"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          TAG_INPUT="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG_INPUT" ]; then
            TAG_INPUT="latest"
          fi
          echo "tag=$TAG_INPUT" >> "$GITHUB_OUTPUT"
          echo "image_name=${{ secrets.DOCKERHUB_USERNAME }}/vigilance-os" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image_name }}:sha-${{ github.sha }}

